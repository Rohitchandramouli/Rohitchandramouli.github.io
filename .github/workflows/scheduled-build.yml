name: Scheduled Weekly Post

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4:00 AM UTC = 9:30 AM IST
   workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Trigger Jekyll rebuild
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit --allow-empty -m "chore: scheduled build trigger $(date -u '+%Y-%m-%d')"
          git push
