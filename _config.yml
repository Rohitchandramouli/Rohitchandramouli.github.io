title: Rohit Chandramouli
description: >-
  Building toward a Tamil Nadu-based AI research institution, one
  shipped system at a time. Notes from a six-month foundation sprint
  into ML engineering, reinforcement learning, and game AI.
url: "https://rohitchandramouli.github.io"
baseurl: ""

author:
  name: Rohit Chandramouli
  github: rohitchandramouli

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
