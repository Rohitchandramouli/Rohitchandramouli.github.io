title: Rohit Chandramouli
description: >-
  Notes from a six-month foundation sprint into ML engineering,
  PyTorch, transformers, and game AI — written as it happens,
  including the parts that don't go to plan.
url: "https://rohitchandramouli.github.io"
baseurl: ""

author:
  name: Rohit Chandramouli
  github: Rohitchandramouli

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
