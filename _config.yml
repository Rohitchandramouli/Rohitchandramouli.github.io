title: Rohit Chandramouli
description: >-
  Notes from a six-month foundation sprint into ML engineering,
  PyTorch, transformers, and game AI — written as it happens,
  including the parts that don't go to plan.
url: "https://rohitchandramouli.github.io"
baseurl: ""

author:
  name: Rohit Chandramouli
  github: Rohitchandramouli

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
permalink: /:year/:month/:day/:title/
future: false

collections:
  tags:
    output: true
    permalink: /tags/:name/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "tags"
    values:
      layout: "tag"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
