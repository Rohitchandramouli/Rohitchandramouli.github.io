<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} &middot; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<style>
  :root{
    --bg:#0d1117;
    --bg-raised:#161b22;
    --panel:#161b22;
    --line:#21262d;
    --line-bright:#30363d;
    --text:#c9d1d9;
    --text-dim:#8b949e;
    --text-faint:#5b6573;
    --signal:#7ee787;
    --signal-dim:#3fb950;
    --warn:#f78166;
    --link:#79c0ff;
    --mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
    --sans: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.7;
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 24px;}
  ::selection{background:#264f78;color:#fff;}

  /* ===== HEADER ===== */
  header.site-header{
    border-bottom:1px solid var(--line);
    padding:18px 0;
  }
  header.site-header .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  header.site-header .brand-block{display:flex;align-items:center;gap:10px;font-family:var(--mono);}
  header.site-header .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--signal);
    box-shadow:0 0 8px var(--signal-dim);
    flex-shrink:0;
  }
  header.site-header a.brand{
    font-family:var(--mono);
    font-size:14.5px;
    font-weight:500;
    color:var(--text);
    text-decoration:none;
  }
  header.site-header a.brand .prompt{color:var(--text-faint);}
  header.site-header nav a{
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--text-dim);
    text-decoration:none;
    margin-left:20px;
    border-bottom:1px solid transparent;
    padding-bottom:2px;
  }
  header.site-header nav a:hover{color:var(--signal);border-bottom-color:var(--signal-dim);}

  /* ===== STATUS STRIP (homepage signature element) ===== */
  .status-strip{
    margin-top:28px;
    border:1px solid var(--line-bright);
    border-radius:6px;
    background:var(--bg-raised);
    overflow:hidden;
  }
  .status-strip .status-row{
    display:flex;
    align-items:stretch;
    font-family:var(--mono);
    font-size:12px;
  }
  .status-strip .status-cell{
    flex:1;
    padding:14px 18px;
    border-right:1px solid var(--line);
  }
  .status-strip .status-cell:last-child{border-right:none;}
  .status-strip .label{
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-size:10.5px;
    margin-bottom:6px;
  }
  .status-strip .value{
    color:var(--text);
    font-size:18px;
    font-weight:600;
  }
  .status-strip .value.signal{color:var(--signal);}
  .status-strip .titlebar{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    padding:8px 18px;
    border-bottom:1px solid var(--line);
    background:#0d1117;
  }
  @media (max-width:560px){
    .status-strip .status-row{flex-direction:column;}
    .status-strip .status-cell{border-right:none;border-bottom:1px solid var(--line);}
    .status-strip .status-cell:last-child{border-bottom:none;}
  }

  .hero{margin:28px 0 8px;}
  .hero p{
    color:var(--text-dim);
    font-size:15.5px;
    margin:0;
    max-width:600px;
  }

  main{padding-bottom:90px;}

  /* ===== SINGLE POST ===== */
  h1.post-title{
    font-family:var(--sans);
    font-weight:700;
    font-size:32px;
    line-height:1.25;
    margin:34px 0 14px;
    letter-spacing:-0.01em;
    color:#fff;
  }
  .post-meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-faint);
    margin-bottom:34px;
    padding-bottom:18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .post-meta::before{content:"$";color:var(--signal-dim);}
  .post-meta .tag{
    display:inline-block;
    background:var(--bg-raised);
    border:1px solid var(--line-bright);
    color:var(--signal);
    padding:2px 9px;
    border-radius:3px;
    font-size:11.5px;
  }

  article.post-content p{margin:0 0 22px;color:var(--text);}
  article.post-content h2{
    font-family:var(--sans);
    font-weight:700;
    font-size:22px;
    margin:44px 0 16px;
    color:#fff;
  }
  article.post-content h2::before{
    content:"##";
    color:var(--signal-dim);
    font-family:var(--mono);
    font-weight:400;
    margin-right:10px;
    font-size:16px;
  }
  article.post-content h3{
    font-family:var(--sans);
    font-weight:600;
    font-size:18px;
    margin:30px 0 10px;
    color:#fff;
  }
  article.post-content blockquote{
    border-left:2px solid var(--signal-dim);
    margin:24px 0;
    padding:4px 0 4px 18px;
    color:var(--text-dim);
    font-style:italic;
  }
  article.post-content blockquote p:last-child{margin-bottom:0;}
  article.post-content code{
    font-family:var(--mono);
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:1px 6px;
    border-radius:3px;
    font-size:0.85em;
    color:var(--signal);
  }
  article.post-content pre{
    background:#010409;
    border:1px solid var(--line-bright);
    color:var(--text);
    padding:18px 20px;
    border-radius:6px;
    overflow-x:auto;
    font-size:13.5px;
    line-height:1.55;
    margin:24px 0;
  }
  article.post-content pre code{background:none;border:none;padding:0;color:var(--text);}
  article.post-content ul, article.post-content ol{padding-left:24px;margin:0 0 22px;color:var(--text);}
  article.post-content li{margin-bottom:9px;}
  article.post-content li::marker{color:var(--text-faint);}
  article.post-content a{color:var(--link);text-decoration:underline;text-decoration-color:#30363d;}
  article.post-content a:hover{text-decoration-color:var(--link);}
  article.post-content img{max-width:100%;border-radius:6px;border:1px solid var(--line);}
  article.post-content hr{border:none;border-top:1px solid var(--line);margin:40px 0;}

  /* ===== POST LIST (homepage, log-line style) ===== */
  .post-list{margin-top:24px;}
  .log-entry{
    display:flex;
    align-items:baseline;
    gap:14px;
    padding:16px 0;
    border-bottom:1px solid var(--line);
    font-family:var(--mono);
  }
  .log-entry:last-child{border-bottom:none;}
  .log-entry .ts{
    flex-shrink:0;
    color:var(--text-faint);
    font-size:12.5px;
    width:104px;
  }
  .log-entry .tagchip{
    flex-shrink:0;
    font-size:10.5px;
    color:var(--signal);
    border:1px solid var(--line-bright);
    border-radius:3px;
    padding:1px 7px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .log-entry .entry-title{
    font-family:var(--sans);
    font-size:16px;
    font-weight:500;
    flex:1;
  }
  .log-entry .entry-title a{color:var(--text);text-decoration:none;}
  .log-entry .entry-title a:hover{color:var(--signal);}
  .log-entry .arrow{color:var(--text-faint);font-family:var(--mono);font-size:13px;}

  .post-excerpt-line{
    font-family:var(--sans);
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 0 118px;
    padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .post-excerpt-line:last-of-type{border-bottom:none;}

  @media (max-width:560px){
    .log-entry{flex-wrap:wrap;}
    .post-excerpt-line{margin-left:0;}
  }

  .empty-state{
    padding:40px 0;
    color:var(--text-faint);
    font-family:var(--mono);
    font-size:13px;
    text-align:center;
  }
  .empty-state::before{content:"// ";}

  /* ===== FOOTER ===== */
  footer.site-footer{
    border-top:1px solid var(--line);
    padding:24px 0;
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-faint);
    text-align:center;
  }
  footer.site-footer a{color:var(--text-faint);}
  footer.site-footer a:hover{color:var(--signal);}

  @media (max-width:540px){
    h1.post-title{font-size:26px;}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div class="brand-block">
      <span class="dot"></span>
      <a class="brand" href="{{ '/' | relative_url }}"><span class="prompt">~/</span>{{ site.title | slugify }}</a>
    </div>
    <nav>
      <a href="{{ '/' | relative_url }}">log</a>
      <a href="{{ '/about/' | relative_url }}">about</a>
      <a href="https://github.com/{{ site.author.github }}">github</a>
    </nav>
  </div>
</header>

<main class="wrap">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    {{ site.author.name }} &middot; built on GitHub Pages &middot; <a href="{{ '/feed.xml' | relative_url }}">rss</a>
  </div>
</footer>

</body>
</html>
