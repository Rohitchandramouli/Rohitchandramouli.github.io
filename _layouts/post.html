---
layout: default
---
<article>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.tags %}{% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}{% endif %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>

<div class="comments-section">

    data-repo-id="R_kgDOS-fkbw"
    data-category="Announcements"
    data-category-id="DIC_kwDOS-fkb84DA1np"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"

</div>
